<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivina el Hiragana</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <div class="parte1">
        <header>
            <p>Imagen 1 de 10 (10 aleatorias)</p>
        </header>
        <section>
            <div class="imagen">
                <img src="assets/a.jpg" alt="Imagen aleatoria">
            </div>
            <div>
                <label>
                    <input type="text" class="nombre_imagen" required
                        placeholder="Escribe el nombre de la imagen actual">
                    <button class="boton1">Comprobar</button>
                    <button class="boton2">Resetear</button>
                </label>
        </section>
    </div>
    </div>
    <div class="parte2">
        <header>
            <h2>Resumen</h2>
            <table>
                <thead class="resumen">
                    <tr>
                        <th>Aciertos</th>
                        <th>Fallos</th>
                        <th>Intentos</th>
                        <th>Pendientes</th>
                    </tr>
                    <td>10</td>
                    <td>1</td>
                    <td>11</td>
                    <td>0</td>
                </thead>
            </table>
            <table class="respuestas">
                <thead>
                    <h2>Historial de respuestas</h2>
                    <tr class="top">
                        <th>#</th>
                        <th>Respuesta escrita</th>
                        <th>Resultado</th>
                    </tr>
                </thead>
                <tbody>
                    <td>Todavia no hay respuestas registradas</td>
                    <!-- Se rellenará la tabla con JS -->
                </tbody>
            </table>
        </header>
    </div>
    <script type="module" src="js/app.js"></script>
</body>

</html>
